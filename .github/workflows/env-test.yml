name: Deployment Pipeline
on:
  push:
    branches:
    - main

jobs:
  test:
    name: Deploy to preview
    runs-on: ubuntu-latest
    steps:
    - name: deploy
      run: |
        echo "deployed to TEST"

  stage:
    name: Deploy to Stage
    runs-on: ubuntu-latest
    needs: [test]
    environment: staging
    steps:
    - name: deploy
      run: |
        echo "deployed to STAGE"

  prod:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs: [test, stage]
    environment: production
    steps:
    - name: deploy
      run: |
        echo "deployed to PROD"
    
