on:
  push:
    branches:
    - main

jobs:
  test:
    name: deploy to preview
    runs-on: ubuntu-latest
    steps:
    - name: deploy
      run: |
        echo "deployed to test"

  stage:
    name: deploy to preview
    runs-on: ubuntu-latest
    needs: [test]
    environment: staging
    steps:
    - name: deploy
      run: |
        echo "deployed to stage"

  prod:
    name: deploy to preview
    runs-on: ubuntu-latest
    needs: [test, stage]
    environment: production
    steps:
    - name: deploy
      run: |
        echo "deployed to prod"
    
